ai_usage_summary: |
  Used an AI pair-programmer to scaffold the project, discuss the scoring design,
  and review code. All scoring logic was calibrated by inspecting the real
  dataset (title/industry/location distributions, honeypot signatures). No
  candidate data was sent to any hosted LLM, and no LLM is called during ranking.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Explainable hybrid ranker, no LLM at inference. Final score =
  content_fit x profile_validity x behavioral_availability. content_fit blends
  seven components: role/title fit (the decisive gate against keyword stuffers),
  domain fit (retrieval/ranking/search/recsys/NLP evidence from career text plus
  a pure-Python TF-IDF similarity to the JD), trust-weighted skill match
  (proficiency x endorsements x duration, validated against platform assessment
  scores), experience-band fit, company/career fit (product vs services,
  anti-job-hopping, consulting-only penalty), location, and education.
  Behavioral signals (recency, recruiter response, notice period) multiply the
  score so perfect-on-paper-but-unreachable candidates fall. Internally
  impossible profiles (honeypots) are detected by consistency checks and pushed
  to the bottom. Runs in ~3 min for 100K candidates on CPU using only the
  Python standard library.

